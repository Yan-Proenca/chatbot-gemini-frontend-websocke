<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Operações — Defesa Nacional</title>

    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"Share Tech Mono"', 'Courier New', 'monospace'],
                        sans: ['Inter', 'Segoe UI', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Tactical grid overlay -->
    <div class="tactical-grid" aria-hidden="true"></div>

    <!-- ===== PAINEL DE CONTROLE (esquerdo) ===== -->
    <aside class="panel control-panel">

        <!-- Cabeçalho com emblema -->
        <div class="panel-section panel-header">
            <div class="emblem-ring" aria-hidden="true">🛡️</div>
            <div class="flex flex-col gap-0.5">
                <span class="label-xs text-khaki">REPÚBLICA FEDERATIVA</span>
                <span class="label-sm text-bone font-bold tracking-widest">DO BRASIL</span>
            </div>
        </div>

        <!-- Avatar com mira tática -->
        <figure class="avatar-section">
            <div class="avatar-frame">
                <!-- Cantos de mira -->
                <div class="reticle reticle-tl" aria-hidden="true"></div>
                <div class="reticle reticle-br" aria-hidden="true"></div>
                <img
                    src="https://mascotetop.com.br/static/media/mascote-3d-robo-sam-show-automall-bh-pose-1.93cf7f7eef80f84e105c.jpg"
                    alt="Assistente IA"
                    class="avatar-img"
                >
            </div>
            <figcaption class="flex flex-col items-center gap-1 mt-3">
                <span class="label-xs text-brass">▸ ASSISTENTE IA — ATIVO</span>
                <span class="label-xs text-khaki">SEGURANÇA PÚBLICA / DEF. NACIONAL</span>
            </figcaption>
        </figure>

        <!-- Barra de status -->
        <div class="status-bar" role="status" aria-live="polite">
            <span class="status-dot" id="status-dot"></span>
            <span class="label-sm" id="status-label">AGUARDANDO INÍCIO</span>
        </div>

        <!-- Botões de controle -->
        <div class="flex flex-col gap-2.5" id="controles">
            <button id="iniciarBtn" class="ctrl-btn btn-start">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-14 9V3z"/></svg>
                Iniciar Operação
            </button>
            <button id="limparBtn" class="ctrl-btn btn-clear">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                Limpar Registros
            </button>
            <button id="encerrarBtn" class="ctrl-btn btn-end">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                Encerrar Missão
            </button>
        </div>

        <!-- Rodapé classificação -->
        <div class="panel-section panel-footer">
            <span class="label-xs text-khaki tracking-widest">[ USO RESTRITO — SISTEMA OFICIAL ]</span>
        </div>
    </aside>

    <!-- ===== PAINEL DE CHAT (direito) ===== -->
    <main class="panel chat-panel">

        <!-- Cabeçalho do chat -->
        <header class="chat-header">
            <div class="flex items-center gap-3">
                <div class="header-shield" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-5 h-5">
                        <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                </div>
                <div class="flex flex-col gap-1">
                    <h1 class="chat-title">CENTRAL DE OPERAÇÕES</h1>
                    <div class="flex items-center gap-2" id="connection-status">
                        <span class="conn-dot" id="conn-dot"></span>
                        <span class="label-xs" id="conn-text">DESCONECTADO</span>
                    </div>
                </div>
            </div>
            <div class="header-badge">
                <span class="label-xs text-brass">CANAL SEGURO</span>
            </div>
        </header>

        <!-- Área de mensagens -->
        <div id="chat-box" class="chat-box" role="log" aria-live="polite" aria-label="Histórico de mensagens"></div>

        <!-- Área de input -->
        <footer class="chat-footer">
            <div class="input-row">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
                <input
                    type="text"
                    id="message-input"
                    class="msg-input"
                    placeholder="Digite sua consulta..."
                    autocomplete="off"
                    aria-label="Campo de mensagem"
                >
                <button id="send-button" class="send-btn" aria-label="Enviar mensagem">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </footer>
    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
