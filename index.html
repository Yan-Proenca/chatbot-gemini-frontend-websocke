<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Espacial com Flask-SocketIO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container control-panel">
        <figure class="avatar-area">
            <img src="https://img.freepik.com/vetores-premium/chatbot-rede-neural-ai-servidores-e-tecnologia-de-robos-cute-chatbot-ai-personagem_651808-563.jpg?semt=ais_hybrid&w=740" alt="Bot Espacial">
        </figure>
        <div id="controles">
            <button id="iniciarBtn">Iniciar Órbita</button>
            <button id="limparBtn">Limpar Painel</button>
            <button id="encerrarBtn">Cortar Sinal</button>
        </div>
    </div>

    <div class="chat-container chat-panel">
        <header class="chat-header">
            <h1>Nebula AI</h1>
            <div id="connection-status" class="status-offline">Buscando sinal...</div>
        </header>
        
        <div id="chat-box" class="chat-box"></div>
        
        <footer class="chat-input-area">
            <input type="text" id="message-input" placeholder="Envie um sinal para a galáxia...">
            <button id="send-button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </footer>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
